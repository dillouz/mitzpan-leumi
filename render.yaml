services:
  - type: web
    name: mitzpan-leumi
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: COUNTER_OFFSET
        value: "1500"
      - key: ADMIN_TOKEN
        generateValue: true
      - key: CRM_WEBHOOK_URL
        sync: false
      - key: SMS_WEBHOOK_URL
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
